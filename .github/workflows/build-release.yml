# 构建 Windows / Linux / macOS 安装包，并发布到 GitHub Releases（制品库）
name: Build Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  CI: "true"
  CARGO_INCREMENTAL: "0"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_RETRY: "5"
  DEBIAN_FRONTEND: noninteractive
  CACHE_ROOT: ${{ github.workspace }}/.build-cache

jobs:
  build-windows:
    name: build-windows
    runs-on: ubuntu-latest
    container: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .build-cache
          key: md-editor-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'package.json', 'package-lock.json') }}
          restore-keys: |
            md-editor-${{ github.job }}-
            md-editor-build-

      - name: Build Windows installers
        run: bash ci/scripts/build-windows.sh

      - name: Upload Windows build output
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: artifacts/windows/
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    container: node:20-bookworm
    needs: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .build-cache
          key: md-editor-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'package.json', 'package-lock.json') }}
          restore-keys: |
            md-editor-${{ github.job }}-
            md-editor-build-

      - name: Build Linux packages
        run: bash ci/scripts/build-linux.sh

      - name: Upload Linux build output
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: artifacts/linux/
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: build-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: .build-cache
          key: md-editor-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'package.json', 'package-lock.json') }}
          restore-keys: |
            md-editor-${{ github.job }}-
            md-editor-build-

      - name: Build macOS arm64 DMG
        run: bash ci/scripts/build-macos.sh

      - name: Upload macOS build output
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: artifacts/macos/
          if-no-files-found: error
          retention-days: 7

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: artifacts/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: artifacts/macos

      - name: Resolve release tag
        id: release
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=MD Editor ${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/linux/*
            artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-email:
    name: notify-email
    runs-on: ubuntu-latest
    # secrets 不能在 if 表达式中使用；用仓库/环境变量 EMAIL_NOTIFICATIONS_ENABLED=true 开启邮件
    if: always() && vars.EMAIL_NOTIFICATIONS_ENABLED == 'true'
    environment: secrets
    needs:
      - build-windows
      - build-linux
      - build-macos
      - publish-github-release
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_HOST }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_NAME }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: >-
            [MD Editor] CI ${{ needs.build-windows.result }}/${{ needs.build-linux.result }}/${{ needs.build-macos.result }}
            (${{ github.ref_name }})
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: true
          body: |
            Workflow: ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}

            build-windows: ${{ needs.build-windows.result }}
            build-linux: ${{ needs.build-linux.result }}
            build-macos: ${{ needs.build-macos.result }}
            publish-github-release: ${{ needs.publish-github-release.result }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Releases: ${{ github.server_url }}/${{ github.repository }}/releases
