---
# 加速说明：
# 1. 宿主机持久缓存（需 trusted 仓库 + 预先创建目录）：
#      sudo mkdir -p /var/lib/drone/cache/md-editor
# 2. 可选：构建并推送 ci/Dockerfile.build 后，将 image 改为 git.anfu.me/anfu/md-editor-build:bookworm 可跳过 apt
kind: pipeline
type: docker
name: build-windows-cross

platform:
  os: linux
  arch: amd64

node:
  runner: localagent

trigger:
  branch:
    - master
  event:
    - push

volumes:
  - name: build-cache
    host:
      path: /var/lib/drone/cache/md-editor

steps:
  - name: build-nsis
    image: docker.1ms.run/library/node:20-bookworm
    volumes:
      - name: build-cache
        path: /cache
    environment:
      CI: "true"
      CARGO_HOME: /cache/cargo
      RUSTUP_HOME: /cache/rustup
      NPM_CONFIG_CACHE: /cache/npm
      CARGO_INCREMENTAL: "0"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
      CARGO_NET_RETRY: "5"
      DEBIAN_FRONTEND: noninteractive
    commands:
      - mkdir -p /cache/cargo /cache/rustup /cache/npm /cache/target
      - export PATH="/cache/cargo/bin:$PATH"
      - ln -snf /cache/target /drone/src/src-tauri/target
      - sed -i 's|deb.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list.d/debian.sources
      - sed -i 's|security.debian.org/debian-security|mirrors.tuna.tsinghua.edu.cn/debian-security|g' /etc/apt/sources.list.d/debian.sources
      - apt-get update
      - apt-get install -y --no-install-recommends curl ca-certificates pkg-config build-essential wget file libssl-dev nsis lld clang llvm
      # Rust 工具链（缓存命中则跳过）
      - |
        if ! command -v rustc >/dev/null 2>&1; then
          export RUSTUP_DIST_SERVER=https://mirrors.ustc.edu.cn/rust-static
          export RUSTUP_UPDATE_ROOT=https://mirrors.ustc.edu.cn/rust-static/rustup
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
        fi
      - 'printf "%s\n" "[source.crates-io]" "replace-with = \"rsproxy-sparse\"" "" "[source.rsproxy-sparse]" "registry = \"sparse+https://rsproxy.cn/index/\"" "" "[net]" "git-fetch-with-cli = true" "retry = 5" > /cache/cargo/config.toml'
      - npm config set registry https://registry.npmmirror.com
      - rustup target add x86_64-pc-windows-msvc
      - command -v cargo-xwin >/dev/null 2>&1 || cargo install cargo-xwin --locked
      - node --version && npm --version && rustc --version
      - npm install --prefer-offline --no-audit --fund=false
      - npm run tauri:build:windows:cross
      - ls -al src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis

  - name: upload to download site
    image: git.anfu.me/anfu/drone-upload:latest
    pull: always
    depends_on:
      - build-nsis
    environment:
      DOWNLOAD_SITE_URL: https://app.anfu.me
      PROJECT_SLUG: MD Editor
      ARTIFACT_DIR: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
      ARTIFACT_UPLOAD_ALL: "true"
      VERSION: "v0.1.2"
      DRONE_UPLOAD_TOKEN:
        from_secret: download_site_upload_token

  - name: "完成通知"
    image: git.anfu.me/anfu/docker-email-notify:latest
    pull: always
    depends_on:
      - upload to download site
    when:
      status:
        - success
        - failure
    environment:
      EMAIL_HOST:
        from_secret: email_host
      EMAIL_PASS:
        from_secret: email_pass
      EMAIL_NAME:
        from_secret: email_name
      EMAIL_PORT:
        from_secret: email_port
      EMAIL_FROM:
        from_secret: email_from
      EMAIL_TO:
        from_secret: email_to
