kind: pipeline
type: docker
name: build-release

platform:
  os: linux
  arch: amd64

node:
  runner: localagent

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

volumes:
  - name: build-cache
    host:
      path: /var/lib/drone/cache/md-editor

steps:
  - name: build-windows
    image: docker.1ms.run/library/node:20-bookworm
    volumes:
      - name: build-cache
        path: /cache
    environment:
      CI: "true"
      CARGO_HOME: /cache/cargo
      RUSTUP_HOME: /cache/rustup
      NPM_CONFIG_CACHE: /cache/npm
      XDG_CACHE_HOME: /cache/xdg-cache
      CARGO_INCREMENTAL: "0"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
      CARGO_NET_RETRY: "5"
      DEBIAN_FRONTEND: noninteractive
    commands:
      - bash ci/scripts/build-windows.sh

  - name: build-linux
    image: docker.1ms.run/library/node:20-bookworm
    volumes:
      - name: build-cache
        path: /cache
    environment:
      CI: "true"
      CARGO_HOME: /cache/cargo
      RUSTUP_HOME: /cache/rustup
      NPM_CONFIG_CACHE: /cache/npm
      XDG_CACHE_HOME: /cache/xdg-cache
      CARGO_INCREMENTAL: "0"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
      CARGO_NET_RETRY: "5"
      DEBIAN_FRONTEND: noninteractive
    commands:
      - bash ci/scripts/build-linux.sh

  - name: gitea-release
    image: docker.1ms.run/plugins/gitea-release
    pull: if-not-exists
    depends_on:
      - build-windows
      - build-linux
    settings:
      api_key:
        from_secret: gitea_token
      base_url: https://git.anfu.me
      files:
        - dist/windows/*
        - dist/linux/*
      file_exists: overwrite

  - name: notify-email
    image: git.anfu.me/anfu/docker-email-notify:latest
    pull: always
    depends_on:
      - gitea-release
    when:
      status:
        - success
        - failure
    environment:
      EMAIL_HOST:
        from_secret: email_host
      EMAIL_PASS:
        from_secret: email_pass
      EMAIL_NAME:
        from_secret: email_name
      EMAIL_PORT:
        from_secret: email_port
      EMAIL_FROM:
        from_secret: email_from
      EMAIL_TO:
        from_secret: email_to
