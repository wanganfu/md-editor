# 插件清单 — 供插件宿主应用读取
# upload.exe 本身不解析此文件；宿主应用根据本文件加载插件并组装命令行

[plugin]
id = "cos-upload"
name = "COS 文件上传"
version = "1.0.0"
description = "通过命令行将本地文件上传到腾讯云 COS"
author = "zeroerr"
type = "cli"
enabled = true

[plugin.binary]
path = "upload.exe"

[plugin.binary.platforms]
windows = "upload.exe"
linux = "upload"
darwin = "upload"

# [cos] 配置键 -> upload.exe CLI 参数名
[plugin.invoke.config_mapping]
access_key_id = "id"
access_key_secret = "secret"
bucket = "b"
region = "r"
endpoint = "endpoint"   # 值为空时可省略该参数

[plugin.action.upload]
id = "upload"
name = "上传文件"
description = "上传本地文件到 COS Bucket"

[plugin.action.upload.params.file]
type = "file"
required = true
description = "待上传的本地文件路径"
cli_flag = "f"
cli_value_prefix = "@"    # 传给 -f 时自动加 @，如 @c:/img.png

[plugin.action.upload.params.key]
type = "string"
required = false
description = "COS 对象键；不填则使用文件名"
cli_flag = "key"

# COS 连接配置（敏感信息，部署时替换为真实值）
[cos]
access_key_id = "YOUR_SECRET_ID"
access_key_secret = "YOUR_SECRET_KEY"
bucket = "your-bucket-name"
region = "ap-guangzhou"
endpoint = ""             # 留空时 upload.exe 会根据 region 自动推断

# 宿主应用参考 — 完整调用示例:
#
# upload.exe \
#   -id "YOUR_SECRET_ID" \
#   -secret "YOUR_SECRET_KEY" \
#   -b "your-bucket-name" \
#   -r "ap-guangzhou" \
#   -f @c:/img.png
#
# 指定对象键:
# upload.exe ... -f @c:/img.png -key "images/avatar.png"
#
# 自定义 Endpoint:
# upload.exe ... -endpoint "cos.ap-guangzhou.myqcloud.com" -f @c:/img.png
